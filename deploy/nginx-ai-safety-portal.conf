# =============================================================================
# Nginx 反向代理：公众门户 Next.js（127.0.0.1:3001）+ 可选直连 API（8000 仅本机）
#
# 部署：
#   sudo cp deploy/nginx-ai-safety-portal.conf /etc/nginx/sites-available/ai-safety-portal
#   sudo ln -sf /etc/nginx/sites-available/ai-safety-portal /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/ai-safety   # 停用旧 Streamlit 站点
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream portal_web {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Next.js 静态资源
    location /_next/static/ {
        proxy_pass http://portal_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://portal_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
