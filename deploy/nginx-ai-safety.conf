# =============================================================================
# Nginx 反向代理 Streamlit（本机 127.0.0.1:8501）
#
# 功能：gzip 压缩静态与接口文本；Streamlit chunk（/static/js|css）长缓存以降低弱网负载失败；
#       主路由保留 WebSocket 头。
#
# 部署：
#   1. 将 server_name 改为域名，或仅用 IP 时保持 server_name _;
#   2. sudo cp 到 sites-available → ln -s → nginx -t → reload nginx
#
# HTTPS：sudo apt install certbot python3-certbot-nginx && sudo certbot --nginx -d 你的域名
# =============================================================================

upstream streamlit_backend {
    server 127.0.0.1:8501;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    # IP 演示用 `_`；有域名时请改为确切域名便于申请证书。
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Streamlit hashed chunks：一年 immutable 缓存。
    location ~ ^/static/(js|css)/ {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /static/ {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
